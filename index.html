<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpoLab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<header>
  <h1>OpoLab</h1>
  <p>Plataforma de entrenamiento para oposiciones físicas</p>
</header>

<div class="container">

  <div class="card">
    <h2>Bienvenido</h2>
    <p>Tu espacio para entrenar pruebas físicas de oposiciones.</p>
  </div>

  <div class="card">
    <h2>Próximamente</h2>
    <p>• Calculadora de marcas<br>
       • Planes de entrenamiento<br>
       • Seguimiento de progresos</p>
    <button onclick="alert('Próximamente 🚀')">Empezar</button>
  </div>

</div>

</body>
</html>
