<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpoLab</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  width: 160px;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<header>
  <h1>OpoLab</h1>
  <p>Plataforma de entrenamiento para oposiciones físicas</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="authCard">
  <h2>Acceso</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">
  <br><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrarse</button>
  <p id="authMsg"></p>
</div>

<!-- USER -->
<div class="card" id="userCard" style="display:none;">
  <h2>Sesión activa</h2>
  <p id="userInfo"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- PERFIL -->
<div class="card">
  <h2>Perfil</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="edad" type="number" placeholder="Edad">
  <input id="sexo" placeholder="Sexo">
  <input id="disponibilidad" placeholder="Días/semana">
  <input id="experiencia" placeholder="Experiencia deportiva">

  <br><br>

  <button onclick="guardarPerfil()">Guardar perfil</button>
  <p id="perfilInfo"></p>
</div>

<!-- OPOSICIONES -->
<div class="card">
  <h2>Pruebas físicas</h2>

  <select id="oposicion" onchange="cargarPruebas()">
    <option value="">Seleccionar</option>
    <option value="local">Policía Local</option>
    <option value="nacional">Policía Nacional</option>
    <option value="bombero">Bomberos</option>
  </select>

  <div id="tests"></div>
</div>

<!-- DASHBOARD -->
<div class="card">
  <h2>Panel entrenador</h2>
  <button onclick="cargarUsuarios()">Ver usuarios</button>
  <div id="usuarios"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PEGA_AQUI_TU_API_KEY",
  authDomain: "opolab-d280b.firebaseapp.com",
  projectId: "opolab-d280b",
  storageBucket: "opolab-d280b.firebasestorage.app",
  messagingSenderId: "763421687343",
  appId: "1:763421687343:web:0d1f88cd88afa067c350da"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ================= LOGIN ================= */

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=> authMsg.innerText="Login correcto")
  .catch(e=> authMsg.innerText=e.message);
}

function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(()=> authMsg.innerText="Usuario creado")
  .catch(e=> authMsg.innerText=e.message);
}

function logout(){
  auth.signOut();
}

/* ================= PERFIL ================= */

function guardarPerfil(){

  let user = auth.currentUser;
  if(!user){
    alert("Inicia sesión");
    return;
  }

  db.collection("usuarios").doc(user.uid).set({
    perfil: {
      nombre: nombre.value,
      edad: edad.value,
      sexo: sexo.value,
      disponibilidad: disponibilidad.value,
      experiencia: experiencia.value
    }
  }, { merge:true });

  perfilInfo.innerText = "Perfil guardado";
}

/* ================= SESIÓN ================= */

auth.onAuthStateChanged(user => {

  if(user){
    authCard.style.display="none";
    userCard.style.display="block";
    userInfo.innerText=user.email;

    db.collection("usuarios").doc(user.uid).get()
    .then(doc=>{
      if(doc.exists){
        let d=doc.data().perfil || {};
        nombre.value=d.nombre||"";
        edad.value=d.edad||"";
        sexo.value=d.sexo||"";
        disponibilidad.value=d.disponibilidad||"";
        experiencia.value=d.experiencia||"";
      }
    });

  } else {
    authCard.style.display="block";
    userCard.style.display="none";
  }

});

/* ================= PRUEBAS ================= */

function cargarPruebas(){

  let op = oposicion.value;

  let html="";

  if(op==="local"){
    html=`
    <h3>Policía Local</h3>

    <p>1000m (segundos)</p>
    <input id="l1">

    <p>Salto (cm)</p>
    <input id="l2">

    <p>Flexiones</p>
    <input id="l3">

    <p>Natación (seg)</p>
    <input id="l4">

    <br><button onclick="evalLocal()">Evaluar</button>
    <p id="res"></p>
    `;
  }

  if(op==="nacional"){
    html=`<h3>Policía Nacional</h3><p>Pruebas variables según convocatoria</p>`;
  }

  if(op==="bombero"){
    html=`<h3>Bomberos</h3><p>Pruebas variables según convocatoria</p>`;
  }

  tests.innerHTML=html;
}

function evalLocal(){

  let errores=[];

  if(parseInt(l1.value)>300) errores.push("1000m mal");
  if(parseInt(l2.value)<200) errores.push("salto mal");
  if(parseInt(l3.value)<20) errores.push("flexiones mal");
  if(parseInt(l4.value)>25) errores.push("natación mal");

  res.innerHTML = errores.length===0
  ? "APTO"
  : "NO APTO<br>"+errores.join("<br>");
}

/* ================= DASHBOARD ================= */

function cargarUsuarios(){

  db.collection("usuarios").get().then(snap=>{

    let html="";

    snap.forEach(doc=>{
      let d=doc.data().perfil||{};

      html+=`
      <div style="background:#0f172a;padding:10px;margin:10px;border-radius:10px;">
        <b>${d.nombre||"sin nombre"}</b><br>
        ${d.edad||""} años<br>
        ${d.sexo||""}<br>
        ${d.disponibilidad||""}<br>
        ${d.experiencia||""}
      </div>`;
    });

    usuarios.innerHTML=html;
  });
}

</script>

</body>
</html>
