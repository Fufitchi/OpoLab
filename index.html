<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OpoLab</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: #1e293b;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  width: 180px;
}

button {
  background: #38bdf8;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<header>
  <h1>OpoLab</h1>
  <p>Plataforma de entrenamiento para oposiciones físicas</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="authCard">
  <h2>Acceso</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">

  <br><br>

  <button onclick="register()">Registrarse</button>
  <button onclick="login()">Entrar</button>

  <p id="authMsg"></p>
</div>

<!-- USER -->
<div class="card" id="userCard" style="display:none;">
  <h2>Sesión iniciada</h2>
  <p id="userInfo"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- PERFIL -->
<div class="card">
  <h2>Perfil</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="edad" type="number" placeholder="Edad">
  <input id="sexo" placeholder="Sexo">

  <br><br>

  <button onclick="guardarPerfil()">Guardar perfil</button>

  <p id="perfilInfo"></p>
</div>

<!-- PRÓXIMAMENTE -->
<div class="card">
  <h2>Registro de resultados</h2>
  <p>Próximamente</p>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAobv-tXwjp2Z9a4i9HsMvilAQCUN5fow0",
  authDomain: "opolab-d280b.firebaseapp.com",
  projectId: "opolab-d280b",
  storageBucket: "opolab-d280b.firebasestorage.app",
  messagingSenderId: "763421687343",
  appId: "1:763421687343:web:0d1f88cd88afa067c350da"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(()=> authMsg.innerText="Login correcto")
  .catch(e=> authMsg.innerText=e.message);
}

function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(()=> authMsg.innerText="Usuario creado")
  .catch(e=> authMsg.innerText=e.message);
}

function logout(){
  auth.signOut();
}

/* PERFIL */
function guardarPerfil(){

  let user = auth.currentUser;
  if(!user){
    alert("Inicia sesión primero");
    return;
  }

  db.collection("usuarios").doc(user.uid).set({
    nombre: nombre.value,
    edad: edad.value,
    sexo: sexo.value
  });

  perfilInfo.innerText = "Perfil guardado";
}

/* SESIÓN */
auth.onAuthStateChanged(user => {

  if(user){
    authCard.style.display = "none";
    userCard.style.display = "block";
    userInfo.innerText = user.email;

    db.collection("usuarios").doc(user.uid).get()
    .then(doc => {
      if(doc.exists){
        let d = doc.data();
        nombre.value = d.nombre || "";
        edad.value = d.edad || "";
        sexo.value = d.sexo || "";
      }
    });

  } else {
    authCard.style.display = "block";
    userCard.style.display = "none";
  }

});
</script>

</body>
</html>
